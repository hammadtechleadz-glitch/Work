<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <style>
        /* Minimal clean font and spacing */
        body {
            font-family: system-ui, sans-serif;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
        }

        /* Spaces out the table rows */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 8px 0;
            vertical-align: top;
        }

        /* Basic styling for form inputs */
        input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Clean blue action button */
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #0052a3;
        }

        /* Simple error alert block */
        .error-box {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Create an Account</h1>

    <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
            <div class="error-box">
                Please correct the errors below.
            </div>
        {% endif %}
        
        <table>
            {{ form.as_table }}
        </table>
        
        <br>
        <button type="submit">Register</button>
    </form>

    <br>
    <p>Already have an account? <a href="/login/">Log In here</a></p>
    <a href="/">Cancel</a>

</body>
</html>
